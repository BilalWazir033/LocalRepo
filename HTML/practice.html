<!DOCTYPE html>
<html>
    <head>
    <title>Admission Form</title>
    <style>
        p {
            font-size: 15px;
            background-color:lightpink;
        }
        img{
            display: block;
            margin: auto;
        }
        p{
            color: green;
            font-family: 'Courier New', Courier, monospace;
        }
        [custom-attr]{
            background-color: aqua;
        }
        
    </style>
    <link rel="Stylesheet" type="text/css" href=practice.css>
    </head>
    <body>
        <img src="WAWA MN.png" alt="Logo" width="200", height="200"  />

        <h1>Admission Form</h1>

        
        <form action="/submit" method="post">

            <label for="username">Full Name:</label><br>
            <input type="text" id="username" name="username"><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>
            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>
            <label for="date">Date of Birth</label><br>
            <input type="date" id="date" name="date" required><br><br>

            <label for="gender">Gender:</label><br>
            <input type="radio" id="male" name="gender" >
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender">
            <label for="female">Female</label><br>
            <input type="radio" id="other" name="gender">
            <label for="other">Other</label><br><br>

            <label for="course">Select Course:</label><br>
            <select id="course" name="course">
                <option value="eng">Artificial Intellegence</option>
                <option value="ds">DS</option>
                <option value="cs">CS</option>
                <option value="cysec">Cysec</option>
            </select><br><br>

            <label for="resume">Upload Resume:</label><br>
            <input type="file" id="resume" name="resume"><br><br>

            <label for="comment">Additional Comments:</label><br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea><br><br>

            <label for="sub">Subscribe to Newsletter:</label>
            <input type="checkbox" id="sub" name="sub" value="yes"><br><br>

            <p>My world of love</p>
            <button custom-attr>Submit</button>

        </form>
    </body>
</html>
